<article class="user-card">
  <div class="identity">
    <div class="avatar" [class]="'avatar ' + avatarClass" aria-hidden="true">
      {{ initials }}
    </div>

    <div>
      <h2>{{ user.name }}</h2>
      <p class="username">&#64;{{ user.username }}</p>
    </div>
  </div>

  <div class="details">
    <div class="detail">
      <span class="label">Email</span>
      <a [href]="'mailto:' + user.email">{{ user.email }}</a>
    </div>

    <div class="detail">
      <span class="label">Phone</span>
      <a [href]="'tel:' + user.phone">{{ user.phone }}</a>
    </div>

    <div class="detail">
      <span class="label">Location</span>
      <span>{{ user.address.city }}, {{ user.address.zipcode }}</span>
    </div>

    <div class="detail">
      <span class="label">Company</span>
      <span>{{ user.company.name }}</span>
    </div>
  </div>

  <footer>
    <a class="website" [href]="websiteUrl" target="_blank" rel="noopener noreferrer">
      {{ user.website }}
    </a>
    <button type="button" (click)="onSelection()">View Todos</button>
  </footer>
</article>
